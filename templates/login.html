<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>로그인 - KICPA 콘텐츠 정산 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="/static/css/style.css">
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<style>
  .login-logo {
    width: 64px; height: 64px; border-radius: 16px;
    background: linear-gradient(135deg, #1a56db 0%, #0891b2 100%);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
    box-shadow: 0 4px 16px rgba(26,86,219,0.25);
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="text-center mb-4">
      <div class="login-logo">
        <iconify-icon icon="mdi:finance" width="34" height="34" style="color:#fff;"></iconify-icon>
      </div>
      <h5 class="fw-bold mb-0" style="color:#1a2340;">KICPA 콘텐츠 정산 관리</h5>
      <small class="text-muted">한국공인회계사회</small>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2 text-center" style="font-size:13px">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label fw-semibold">아이디</label>
        <input type="text" name="username" class="form-control" placeholder="아이디 입력" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">비밀번호</label>
        <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-bold">로그인</button>
    </form>
    <p class="text-center text-muted mt-3 mb-0" style="font-size:11px">© 2026 KICPA 콘텐츠 정산 관리 시스템</p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
